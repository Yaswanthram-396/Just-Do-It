kind = "web"
previewPath = "/"
title = "Cinamitra"
version = "1.0.0"
id = "artifacts/cinamitra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22846

[services.development]
run = "pnpm --filter @workspace/cinamitra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cinamitra", "run", "build" ]
publicDir = "artifacts/cinamitra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22846"
BASE_PATH = "/"
